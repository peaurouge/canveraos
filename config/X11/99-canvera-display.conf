# CanveraOS — X.Org Display Configuration
# Forces EDID-based mode detection and allows all refresh rates.
# Without this, some drivers lock refresh rate to 60Hz even if monitor supports more.
# Place at: /etc/X11/xorg.conf.d/99-canvera-display.conf

Section "ServerFlags"
    # Use all available modes from EDID — required for 120Hz/144Hz/160Hz monitors
    Option "AutoAddDevices"     "true"
    Option "AutoEnableDevices"  "true"
    Option "DontZap"            "false"
EndSection

Section "Extensions"
    # Enable Composite extension (required for blur/transparency)
    Option "Composite" "Enable"
EndSection

Section "Monitor"
    Identifier   "Monitor0"
    # Trust the monitor's EDID for supported modes/refresh rates
    Option       "UseEdid"              "true"
    Option       "UseEdidFreqs"         "true"
    Option       "UseEdidDpi"           "true"
    # Don't limit to 60Hz — use whatever EDID reports
    Option       "PreferredMode"        "auto"
    # Enable all EDID-reported resolutions and refresh rates
    Option       "DPMS"                 "true"
EndSection

Section "Monitor"
    Identifier   "Monitor1"
    Option       "UseEdid"              "true"
    Option       "UseEdidFreqs"         "true"
    Option       "UseEdidDpi"           "true"
    Option       "PreferredMode"        "auto"
    Option       "DPMS"                 "true"
EndSection

# Generic device section — works with nvidia, modesetting, and nouveau
Section "Device"
    Identifier   "Device0"
    # Driver is auto-detected — don't hard-code nvidia here
    # Option     "Driver"    "nvidia"

    # For NVIDIA (applied when nvidia driver is active):
    Option       "AllowIndirectGLXProtocol"  "off"
    Option       "TripleBuffer"              "on"
    Option       "UseEdid"                   "true"
    Option       "ModeValidation"            "NoMaxPClkCheck, AllowNonEdidModes"

    # For modesetting/AMD (applied when modesetting driver is active):
    Option       "TearFree"                  "true"
    Option       "AccelMethod"               "glamor"
EndSection

Section "Screen"
    Identifier   "Screen0"
    Device       "Device0"
    Monitor      "Monitor0"
    DefaultDepth  24

    SubSection "Display"
        Depth    24
        # Empty Modes means: use all EDID modes (includes all refresh rates)
        # DO NOT list specific modes here — that limits available options
    EndSubSection
EndSection
