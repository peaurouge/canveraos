# CanveraOS — Calamares Installer Settings
# Controls the installation wizard steps.
# Based on calamares-settings-ubuntu (Ubuntu 24.04 / Calamares 3.3+)

---
modules-search:
  - local
  - /usr/lib/calamares/modules

# ─── Installation sequence ────────────────────────────────────────────────────
sequence:
  # ── Welcome / user input screens ──────────────────────────────────────────
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary

  # ── Actual installation (runs without user interaction) ────────────────────
  # Order matters: partition → mount → unpackfs → configure → bootloader → umount
  - exec:
      - partition          # Create partitions on target disk
      - mount              # Mount target partitions
      - unpackfs           # Copy squashfs to target disk (CRITICAL)
      - machineid          # Generate /etc/machine-id
      - fstab              # Write /etc/fstab
      - locale             # Set system locale
      - keyboard           # Set keyboard layout
      - localecfg          # Finalize locale config
      - users              # Create user account + copy /etc/skel
      - displaymanager     # Configure SDDM
      - networkcfg         # Set hostname + /etc/hosts
      - hwclock            # Set hardware clock (UTC)
      - services-systemd   # Enable/disable systemd services
      - initramfs          # Regenerate initramfs for installed kernel
      - grubcfg            # Generate GRUB configuration
      - bootloader         # Install GRUB to EFI/MBR
      - shellprocess@canvera_postinstall  # CanveraOS cleanup
      - umount             # Unmount target

  # ── Completion ─────────────────────────────────────────────────────────────
  - show:
      - finished

# ─── Brand settings ───────────────────────────────────────────────────────────
branding: canvera

# ─── Global settings ──────────────────────────────────────────────────────────
prompt-install:              false
dont-chroot:                 false
disable-cancel:              false
disable-cancel-during-exec:  true
quit-at-end:                 false

# ─── Requirements ─────────────────────────────────────────────────────────────
requirements:
  requiredRam:        4096
  recommendedRam:     8192
  requiredStorage:    25
  recommendedStorage: 50
  internetCheckUrl:   "https://google.com"
  check:
    - storage
    - ram
  required:
    - storage
    - ram
