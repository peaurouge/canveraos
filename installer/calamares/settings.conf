# CanveraOS — Calamares Installer Settings
# Controls the installation wizard steps.

---
# Module search paths
modules-search:
  - local
  - /usr/lib/calamares/modules

# ─── Installation sequence ────────────────────────────────────────────────────
sequence:
  # ── Welcome / user input screens ────────────────────────────────────────────
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary

  # ── Actual installation (no user input here) ─────────────────────────────────
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - packages
      - initramfs
      - grub
      - grubcfg
      - bootloader
      - shellprocess@canvera_postinstall
      - umount

  # ── Completion ───────────────────────────────────────────────────────────────
  - show:
      - finished

# ─── Brand settings ───────────────────────────────────────────────────────────
branding: canvera

# ─── Global settings ──────────────────────────────────────────────────────────
prompt-install:              false
dont-chroot:                 false
disable-cancel:              false
disable-cancel-during-exec:  true
quit-at-end:                 false

# ─── Requirements ─────────────────────────────────────────────────────────────
requirements:
  requiredRam:        4096
  recommendedRam:     8192
  requiredStorage:    25
  recommendedStorage: 50
  internetCheckUrl:   "https://google.com"
  check:
    - storage
    - ram
  required:
    - storage
    - ram
