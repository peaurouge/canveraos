# CanveraOS — Calamares Installer Settings
# This file controls the sequence of installation steps shown to the user.
# Every step here appears as a page in the graphical installation wizard.

---
# Modules search paths
modules-search: [ local, /usr/lib/calamares/modules ]

# ─── Installation sequence ────────────────────────────────────────────────────
# Each entry is a module. The order defines the installer wizard page order.
sequence:
  # ── Welcome screen ──────────────────────────────────────────────────────────
  - show:
    - welcome          # Welcome to CanveraOS screen
    - locale           # Language and locale selection (en_US only)
    - keyboard         # Keyboard layout selector

  # ── System setup ────────────────────────────────────────────────────────────
  - show:
    - partition        # Disk partitioning (guided or manual)
    - users            # Create user account (name, password, auto-login option)

  # ── Installation ────────────────────────────────────────────────────────────
  - exec:
    - partition        # Actually partition the disk
    - mount            # Mount target partitions
    - unpackfs         # Extract SquashFS filesystem to disk
    - machineid        # Generate unique machine ID
    - fstab            # Create /etc/fstab
    - locale           # Configure locale in target
    - keyboard         # Configure keyboard in target
    - localecfg        # Set locale config files
    - users            # Create user accounts
    - displaymanager   # Configure SDDM login manager
    - networkcfg       # Configure NetworkManager
    - hwclock          # Sync hardware clock
    - services-systemd # Enable/disable systemd services
    - nvidia_driver    # ← NVIDIA GPU driver download & install step
    - packages         # Install any remaining packages
    - luksbootkeyfile  # Set up LUKS if encryption was chosen
    - initramfs        # Regenerate initramfs
    - grub             # Install and configure GRUB bootloader
    - grubcfg          # Write GRUB config
    - bootloader       # Finalize bootloader
    - canvera_postinstall  # Create /etc/canvera-installed, clean live-only files
    - umount           # Unmount target filesystems

  # ── Completion screen ────────────────────────────────────────────────────────
  - show:
    - finished         # Installation complete — restart button

# ─── Brand settings ───────────────────────────────────────────────────────────
branding: canvera

# ─── Global settings ──────────────────────────────────────────────────────────
prompt-install: false         # Don't ask "Are you sure?" before installing
dont-chroot: false            # Always use chroot for exec modules
disable-cancel: false         # Allow cancelling before install starts
disable-cancel-during-exec: true  # Cannot cancel once install has begun
quit-at-end: false            # Show restart button, don't auto-quit

# ─── Requirements ─────────────────────────────────────────────────────────────
requirements:
  requiredRam: 4096            # 4 GB RAM minimum
  recommendedRam: 8192         # 8 GB recommended
  requiredStorage: 25          # 25 GB minimum disk space
  recommendedStorage: 50       # 50 GB recommended
  internetCheckUrl: "https://google.com"
  check:
    - storage
    - ram
    - power
    - internet
  required:
    - storage
    - ram
