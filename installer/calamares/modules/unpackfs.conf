---
# CanveraOS — Calamares unpackfs module
# Tells Calamares WHERE to find the squashfs and where to unpack it.
# WITHOUT this file, Calamares does not know what to copy to disk
# and the installation produces an empty (unbootable) system.
#
# Ubuntu 24.04 + casper: squashfs is at /run/live/medium/casper/filesystem.squashfs
# casper creates this mountpoint when booting from the live ISO.
# /cdrom is a symlink to /run/live/medium on most systems.

unpack:
    -   source: /run/live/medium/casper/filesystem.squashfs
        sourcefs: squashfs
        destination: ""
