---
# CanveraOS — Calamares services-systemd module
# Configures which systemd services are enabled/disabled in the installed system.
# Without this file, critical services like NetworkManager may not start after install.

services:
    # Networking — CRITICAL for internet after install
    -   name: NetworkManager
        enabled: true
    -   name: NetworkManager-wait-online
        enabled: true

    # Login manager — CRITICAL for graphical login screen
    -   name: sddm
        enabled: true

    # Hardware
    -   name: bluetooth
        enabled: true
        optional: true
    -   name: cups
        enabled: true
        optional: true

    # Security
    -   name: apparmor
        enabled: true
        optional: true
    -   name: ufw
        enabled: true
        optional: true

    # Disable live-session-only services
    -   name: casper
        enabled: false
        optional: true
    -   name: casper-md5check
        enabled: false
        optional: true
