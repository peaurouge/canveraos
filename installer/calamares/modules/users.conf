---
# CanveraOS — Calamares Users Module
# User account creation page in installer

# Default shell
defaultShell:     /bin/bash

# User groups — standard groups for desktop functionality
defaultGroups:
    - name: sudo
      state: true
    - name: audio
      state: true
    - name: video
      state: true
    - name: plugdev
      state: true
    - name: netdev
      state: true
    - name: bluetooth
      state: true
    - name: lpadmin
      state: true
    - name: scanner
      state: true

# Auto-login option (checkbox in installer, default off)
autologinGroup:     autologin
doAutologin:        false

# Password strength (minimum)
passwordRequirements:
    minLength:    8
    maxLength:    256
    libpwquality:
        - minlen=8

# Root account settings
setRootPassword: false      # Use sudo, no direct root login
rootPasswordSet: false

# User home directory permissions
userShell:        /bin/bash

# These are shown as pre-filled suggestions in the installer UI
presets:
    fullName: ""
    loginName: ""
    hostname: "canvera"
