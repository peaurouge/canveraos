---
# CanveraOS — Calamares Partition Module Configuration
---
# Partition layout used during installation.
# Supports guided (automatic) and manual (advanced) modes.

efiSystemPartition:          /boot/efi
efiSystemPartitionSize:      512       # MiB
efiSystemPartitionName:      EFI System Partition

# Default partition layout (guided mode)
# User can override in installer
initialPartitioningChoice:   erase     # Options: none, erase, alongside, replace, manual
initialSwapChoice:           zram      # Use zram instead of swap partition

defaultFileSystemType:       ext4      # Can be changed to btrfs
availableFileSystemTypes:    ["ext4", "btrfs", "xfs"]

# LUKS encryption support (offered as checkbox in installer)
allowManualPartitioning:     true
showNotEncryptedBootMessage: false

# Minimum disk sizes
requiredStorage: 25.0   # GB minimum

# Partition scheme presets for guided mode
partitionLayout:
  - name: "/"
    filesystem: ext4
    mountPoint: /
    size: 100%
    lvm: false
