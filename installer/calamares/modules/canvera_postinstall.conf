---
# CanveraOS post-install cleanup — shellprocess module
# Runs inside the TARGET (installed) system chroot after all other Calamares steps.
#
# ============================================================================
# IMPORTANT — HOW CALAMARES SHELLPROCESS WORKS:
# Each item in the 'script:' list is a PATH to an executable file on disk.
# Calamares does NOT interpret items as inline bash commands.
# 
# WRONG (silently fails — Calamares tries to find a script at the literal path):
#   script:
#     - "-touch /etc/canvera-installed"
#
# CORRECT (Calamares executes the file at this path in the target chroot):
#   script: /usr/local/bin/canvera-postinstall.sh
#
# The postinstall script is created during the ISO build (chroot-setup.sh).
# It gets included in the squashfs, so it exists in the installed system.
# ============================================================================

dontChroot: false
verbose:    true
timeout:    60

# Single script file that handles ALL postinstall cleanup.
# Created by chroot-setup.sh at build time, included in the squashfs.
# Contains: installed marker, SDDM autologin cleanup, sudo rule cleanup,
# installer autostart removal, and apt cache cleanup.
# CRITICAL: Must be a YAML list (- "path"), NOT a scalar (script: path).
# Calamares shellprocess module iterates over a list — scalar form is silently ignored.
script:
    - "/usr/local/bin/canvera-postinstall.sh"

