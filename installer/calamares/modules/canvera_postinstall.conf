---
# CanveraOS post-install cleanup — shellprocess module
# Runs inside the TARGET (installed) system chroot after all other steps.
# Creates the "installed" marker so the installer auto-launch never re-fires.

dontChroot: false
verbose: true
timeout: 30

script:
  # Create marker file so canvera-installer-launcher skips on installed system
  - "-touch /etc/canvera-installed"

  # CRITICAL: Remove live-session-only SDDM autologin config.
  # Without this, SDDM on the installed system tries to autologin as 'ubuntu'
  # (the live session user), which doesn't exist → infinite login loop.
  - "-rm -f /etc/sddm.conf.d/90-canvera-live-autologin.conf"
  # Also remove the old combined config if it exists (from earlier builds)
  - "-rm -f /etc/sddm.conf.d/canvera.conf"

  # Remove NOPASSWD sudo rule (was only for live session)
  - "-rm -f /etc/sudoers.d/90-canvera-live"

  # Remove installer auto-launch from skel (new users won't get it)
  - "-rm -f /etc/skel/.config/autostart/canvera-installer.desktop"

  # Remove installer auto-launch from any existing home dirs
  - "-find /home -maxdepth 5 -name 'canvera-installer.desktop' -path '*/autostart/*' -delete"

  # Clean apt cache on installed system
  - "-apt-get clean"
  - "-rm -rf /tmp/canvera-* /var/tmp/canvera-*"
