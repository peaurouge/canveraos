---
# CanveraOS — NVIDIA Driver Calamares Module Configuration
---
type: job
name: nvidia_driver
interface: python
script: nvidia_driver.py

# This module runs after the base system is installed but before first boot.
# It detects NVIDIA hardware and downloads the appropriate driver.
# If no internet is available, it schedules the install for first boot.

# Module settings
required: false
weight: 50

# Progress labels shown in the installer UI
pretty_name: "Setting up Graphics Driver"
pretty_desc: "Detecting your GPU and installing the optimal driver..."
