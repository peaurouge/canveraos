---
# CanveraOS — Calamares Display Manager Module
# Configures SDDM for the installed system.
# Uses X11 by default for maximum hardware compatibility.

displaymanager: sddm

# Default session — X11 for compatibility (user can switch to Wayland after install)
defaultDesktopEnvironment:
    executable: startplasma-x11
    desktopFile: plasma

# Don't auto-configure autologin — let user choose in installer users step
basicSetup: false

# SDDM configuration written to the TARGET (installed) system
sddmConf: |
    [Theme]
    Current=breeze
    CursorTheme=breeze_cursors

    [General]
    DisplayServer=x11
    HaltCommand=/usr/bin/systemctl poweroff
    RebootCommand=/usr/bin/systemctl reboot
    Numlock=on

    [Users]
    MaximumUid=60000
    MinimumUid=1000

    [Autologin]
    Relogin=false
