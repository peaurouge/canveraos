---
# CanveraOS — Calamares Display Manager Module
# Configures SDDM as the login screen manager

displaymanager: sddm

# Default session (KDE Plasma Wayland preferred, X11 fallback)
defaultDesktopEnvironment:
    executable: startplasma-wayland
    desktopFile: plasmawayland

# Autologin (only if user enabled it in installer)
basicSetup: false

# SDDM configuration written to target
sddmConf: |
    [Theme]
    Current=canvera-login
    CursorTheme=WhiteSur-cursors
    Font=Inter

    [General]
    DisplayServer=wayland
    HaltCommand=/usr/bin/systemctl poweroff
    RebootCommand=/usr/bin/systemctl reboot
    Numlock=on

    [Autologin]
    Relogin=false
