name: "🏗️ Build CanveraOS ISO"

# ─── Trigger: Manual only ─────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      version:
        description: "ISO version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      create_release:
        description: "Create GitHub Release with the ISO?"
        type: boolean
        required: true
        default: true

# ─── Fix Node.js 20 deprecation warning ───────────────────────────────────────
# GitHub moves to Node.js 24 for all actions from June 16, 2026.
# This opts in early so actions/checkout, upload-artifact, etc. all work.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write
  actions: write

# ─── Job ──────────────────────────────────────────────────────────────────────
jobs:
  build-iso:
    name: "Build CanveraOS v${{ github.event.inputs.version }}"

    # KEY FIX: Use ubuntu-24.04 runner (not ubuntu-22.04)
    # We bootstrap Ubuntu 24.04 (Noble). The ubuntu-24.04 runner has the Noble
    # GPG keyring natively. ubuntu-22.04 was missing it → caused exit code 1.
    runs-on: ubuntu-24.04

    timeout-minutes: 180

    steps:
      # ── Disk space report ────────────────────────────────────────────────────
      - name: "📊 Initial disk space"
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h /
          echo ""
          du -sh /usr/local/lib/android    2>/dev/null && echo "  ↑ Android SDK" || true
          du -sh /usr/share/dotnet         2>/dev/null && echo "  ↑ .NET SDK"    || true
          du -sh /opt/ghc                  2>/dev/null && echo "  ↑ Haskell"     || true
          du -sh /opt/hostedtoolcache      2>/dev/null && echo "  ↑ Tool cache"  || true
          docker images --format "table {{.Repository}}\t{{.Size}}" 2>/dev/null | head -6 || true

      # ── Free disk space (~35 GB recovered) ───────────────────────────────────
      - name: "🧹 Free disk space"
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet /usr/local/share/dotnet
          sudo rm -rf /opt/ghc /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk
          docker system prune -af --volumes 2>/dev/null || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          echo ""
          echo "=== Disk space AFTER cleanup ==="
          df -h /

      # ── Checkout repository ───────────────────────────────────────────────────
      - name: "📥 Checkout CanveraOS"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Install build tools ───────────────────────────────────────────────────
      - name: "🔧 Install ISO build tools"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap squashfs-tools xorriso grub-pc-bin \
            grub-efi-amd64-bin grub-efi-amd64-signed mtools dosfstools \
            isolinux syslinux-utils wget curl rsync python3 python3-pip \
            git ca-certificates apt-transport-https zenity wmctrl arch-test
          debootstrap --version
          echo "✅ Build tools installed."

      # ── Disk space check ──────────────────────────────────────────────────────
      - name: "📊 Verify disk space (need > 25 GB)"
        run: |
          FREE_GB=$(df -BG / | awk 'NR==2 {gsub("G",""); print $4}')
          echo "Free: ${FREE_GB} GB"
          if [[ ${FREE_GB} -lt 25 ]]; then
            echo "❌ Not enough space — need 25 GB, have ${FREE_GB} GB"
            df -h && du -sh /* 2>/dev/null | sort -rh | head -15
            exit 1
          fi
          echo "✅ Disk OK: ${FREE_GB} GB free."

      # ── Network check ─────────────────────────────────────────────────────────
      - name: "🌐 Test Ubuntu server connectivity"
        run: |
          curl -s --max-time 10 http://archive.ubuntu.com/ubuntu/ > /dev/null \
            && echo "✅ Ubuntu archive reachable." \
            || { echo "❌ Cannot reach Ubuntu archive!"; exit 1; }

      # ── Build the ISO ─────────────────────────────────────────────────────────
      - name: "🏗️ Build CanveraOS ISO (60-90 minutes)"
        env:
          CANVERA_VERSION: ${{ github.event.inputs.version }}
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x build/*.sh scripts/*.sh
          find config -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

          echo "Version:    ${CANVERA_VERSION}"
          echo "Runner OS:  $(lsb_release -d | cut -f2)"
          echo "Free disk:  $(df -h / | awk 'NR==2 {print $4}')"
          echo ""

          sudo --preserve-env=CANVERA_VERSION,DEBIAN_FRONTEND bash build/build-iso.sh

          echo ""
          echo "=== Build output ==="
          ls -lh CanveraOS-*.iso 2>/dev/null || {
            echo "❌ ISO not found — build failed."
            df -h /
            exit 1
          }

      # ── Checksum ──────────────────────────────────────────────────────────────
      - name: "🔒 Generate SHA256 checksum"
        run: |
          ISO=$(ls CanveraOS-*.iso | head -1)
          echo "File: ${ISO}  |  Size: $(du -sh ${ISO} | cut -f1)"
          sha256sum "${ISO}" > "${ISO}.sha256"
          cat "${ISO}.sha256"
          {
            echo "## ✅ CanveraOS Build Complete"
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Version | v${{ github.event.inputs.version }} |"
            echo "| File | ${ISO} |"
            echo "| Size | $(du -sh ${ISO} | cut -f1) |"
            echo "| SHA256 | \`$(cut -d' ' -f1 ${ISO}.sha256)\` |"
            echo "| Built | $(date -u '+%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Upload artifact (7-day temporary copy) ────────────────────────────────
      - name: "📦 Upload ISO artifact (7-day expiry)"
        uses: actions/upload-artifact@v4
        with:
          name: "CanveraOS-${{ github.event.inputs.version }}-amd64"
          path: |
            CanveraOS-*.iso
            CanveraOS-*.iso.sha256
          retention-days: 7
          compression-level: 0
          if-no-files-found: error

      # ── GitHub Release (permanent download) ───────────────────────────────────
      - name: "🚀 Create GitHub Release"
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "CanveraOS v${{ github.event.inputs.version }} — Aurora"
          draft: false
          prerelease: false
          body: |
            ## CanveraOS v${{ github.event.inputs.version }}

            A fully pre-configured Linux distribution for creative professionals.
            Built on Ubuntu 24.04 LTS + KDE Plasma 6 with macOS Tahoe-inspired design.

            ### What's included
            - 🖥️ KDE Plasma 6 — macOS Tahoe theme, frosted glass dock, traffic-light buttons
            - 🎨 Adobe CC via CrossOver — Photoshop, Illustrator, Premiere, After Effects, Lightroom
            - 🎬 DaVinci Resolve native + CUDA/RTX GPU acceleration
            - 🎵 All codecs pre-installed — H.264, H.265, AV1, ProRes, DNxHD, HEIC, RAW
            - 🔲 Dolphin file manager — 3 views: Icon, List, Column (like macOS Finder)
            - 🌙 Auto dark/light mode with time schedule
            - 🎮 Steam + Proton gaming
            - 📋 Persistent clipboard manager (CopyQ)
            - 🔍 Command Palette — Super+Space
            - 🖥️ Smart Workspace Modes — Video Edit, Design, Writing, Gaming

            ### Install
            1. Download the `.iso` file below
            2. Flash to USB with [Balena Etcher](https://etcher.balena.io)
            3. Boot from USB — follow the graphical installer

            > **NVIDIA driver** downloaded during install (internet required).
            > **CrossOver** — enter license key on first boot.
            > **Adobe CC** — click app icon → wizard → log in with Adobe ID.
          files: |
            CanveraOS-*.iso
            CanveraOS-*.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Final report (runs even if build failed) ──────────────────────────────
      - name: "📊 Final report"
        if: always()
        run: |
          echo "=== Final disk state ==="
          df -h /
          echo ""
          echo "=== ISO files ==="
          ls -lh CanveraOS-*.iso 2>/dev/null || echo "(none found)"
